<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAANI AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="card">

<h1>🌐 VAANI AI</h1>

<div class="translate-area">

<div class="panel">

<h3>Enter Text</h3>

<textarea
id="input"
placeholder="Type your text..."
></textarea>

<select id="source">

<option>English</option>
<option>Telugu</option>
<option>Hindi</option>
<option>Tamil</option>
<option>Kanada</option>

</select>

</div>


<div class="swap">

<button>
⇄
</button>

</div>


<div class="panel">

<h3>Translation</h3>

<textarea
readonly
placeholder="Output appears here..."
></textarea>

<select>

<option>Telugu</option>
<option>English</option>
<option>Hindi</option>
<option>Tamil</option>
<option>Kanada</option>


</select>

</div>

</div>


<div class="actions">

<button class="translate">
Translate
</button>

<button class="copy">
Copy
</button>

</div>

</div>
<script src="script.js"></script>
</body>

</html>
